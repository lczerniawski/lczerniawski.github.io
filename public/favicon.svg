<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect class="bg" x="4" y="4" width="56" height="56" rx="12" />
  <rect class="frame" x="10" y="12" width="44" height="40" rx="6" />
  <circle class="dot1" cx="18" cy="19" r="2" />
  <circle class="dot2" cx="24" cy="19" r="2" />
